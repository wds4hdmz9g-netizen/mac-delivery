name: Build Mac Electron Packages

on:
  push:
    branches: [main]

jobs:
  build-mac-lipsync:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install FFmpeg and cache for bundling
        working-directory: lipsync
        run: |
          brew install ffmpeg
          mkdir -p .ffmpeg
          cp $(which ffmpeg) .ffmpeg/ffmpeg
          chmod +x .ffmpeg/ffmpeg
          echo "FFmpeg installed: $(.ffmpeg/ffmpeg -version | head -1)"
          
      - name: Build AI口播助手
        working-directory: lipsync
        run: |
          npm install
          npx electron-builder --mac --x64 --arm64
          
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AI口播助手-Mac版
          path: lipsync/dist-electron/*.dmg

  build-mac-matrix:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install FFmpeg and cache for bundling
        working-directory: matrix
        run: |
          brew install ffmpeg
          mkdir -p .ffmpeg
          cp $(which ffmpeg) .ffmpeg/ffmpeg
          chmod +x .ffmpeg/ffmpeg
          echo "FFmpeg installed: $(.ffmpeg/ffmpeg -version | head -1)"
          
      - name: Build 矩阵工厂
        working-directory: matrix
        run: |
          npm install
          npx electron-builder --mac --x64 --arm64
          
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: 矩阵工厂-Mac版
          path: matrix/dist-electron/*.dmg