<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕识别 & 封面测试</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei',sans-serif; background:#1a1a2e; color:#eee; padding:20px; }
h2 { color:#7c3aed; margin:20px 0 10px; border-bottom:2px solid #7c3aed; padding-bottom:5px; }
.card { background:#16213e; border-radius:12px; padding:20px; margin:15px 0; }
button { background:#7c3aed; color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:14px; margin:5px; }
button:hover { background:#6d28d9; }
button:disabled { opacity:0.5; cursor:not-allowed; }
input,select,textarea { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #333; background:#0f3460; color:#eee; font-size:14px; }
textarea { resize:vertical; min-height:80px; }
.result { background:#0f3460; border-radius:8px; padding:15px; margin:10px 0; white-space:pre-wrap; word-break:break-all; max-height:300px; overflow:auto; }
.template-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
.template-card { background:#0f3460; border-radius:10px; padding:15px; text-align:center; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
.template-card:hover,.template-card.selected { border-color:#7c3aed; background:#1a0a3e; }
.template-card .name { font-size:14px; margin-top:5px; }
.template-card .preview { width:100%; aspect-ratio:1; background:#1a1a2e; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#7c3aed; margin-bottom:8px; }
#coverImg { max-width:100%; border-radius:8px; display:none; }
.status { color:#a78bfa; font-size:13px; margin:5px 0; }
.error { color:#ef4444; }
.success { color:#22c55e; }
</style>
</head>
<body>

<h1 style="text-align:center;color:#7c3aed;">🎬 AI数字人口播助手 - 测试面板</h1>

<!-- ====== 字幕识别 ====== -->
<div class="card">
<h2>📝 字幕识别测试</h2>
<p>选择一个音频文件（TTS生成的MP3），自动识别文字</p>
<input type="file" id="audioFile" accept="audio/*">
<button onclick="testASR()">🚀 识别字幕</button>
<div id="asrStatus" class="status"></div>
<textarea id="asrResult" class="result" readonly placeholder="识别结果将显示在这里..."></textarea>
</div>

<!-- ====== 封面生成 ====== -->
<div class="card">
<h2>🎨 封面生成测试</h2>
<input type="text" id="coverText" placeholder="输入封面文字，如：广州黄埔电子厂直招 月薪8000">
<div class="template-grid" id="templateGrid"></div>
<button onclick="testCover()">🎨 生成封面</button>
<div id="coverStatus" class="status"></div>
<img id="coverImg" alt="封面预览">
</div>

<script>
const BASE = window.location.origin;

// ===== 字幕识别 =====
async function testASR() {
  const file = document.getElementById('audioFile').files[0];
  if (!file) { alert('请先选择音频文件'); return; }
  
  const status = document.getElementById('asrStatus');
  const result = document.getElementById('asrResult');
  status.textContent = '识别中...';
  status.className = 'status';
  
  try {
    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch(BASE + '/api/asr', { method:'POST', body:fd });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    result.value = data.text || '(无内容)';
    status.textContent = '✅ 识别成功';
    status.className = 'status success';
  } catch(e) {
    status.textContent = '❌ 失败: ' + e.message;
    status.className = 'status error';
    result.value = '';
  }
}

// ===== 封面模板 =====
async function loadTemplates() {
  try {
    const r = await fetch(BASE + '/api/cover-templates');
    const d = await r.json();
    const grid = document.getElementById('templateGrid');
    grid.innerHTML = d.templates.map(t => `
      <div class="template-card" onclick="selectTemplate('${t.id}', this)" data-id="${t.id}">
        <div class="preview">${t.name}</div>
        <div class="name">${t.name}</div>
      </div>
    `).join('');
    // 默认选中第一个
    document.querySelector('.template-card')?.classList.add('selected');
  } catch(e) { console.error(e); }
}

let selectedTemplate = 'default';
function selectTemplate(id, el) {
  document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedTemplate = id;
}

async function testCover() {
  const text = document.getElementById('coverText').value.trim();
  if (!text) { alert('请输入封面文字'); return; }
  
  const status = document.getElementById('coverStatus');
  const img = document.getElementById('coverImg');
  status.textContent = '生成中...';
  status.className = 'status';
  img.style.display = 'none';
  
  try {
    const r = await fetch(BASE + '/api/cover', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, template: selectedTemplate })
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    img.src = data.imageUrl;
    img.style.display = 'block';
    status.textContent = '✅ 生成成功 - ' + (data.templateName || '');
    status.className = 'status success';
  } catch(e) {
    status.textContent = '❌ 失败: ' + e.message;
    status.className = 'status error';
  }
}

// 初始化
loadTemplates();
</script>
</body>
</html>
